services:
  lug-manager:
    image: ghcr.io/arklug/lug-manager:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LUG_TEMPLATES_DIR=/app/src/templates
      - LUG_DB_PATH=/app/data/lug.db
      - LUG_PORT=8080
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://localhost:8080/auth/callback}
      - BOOTSTRAP_ADMIN_DISCORD_ID=${BOOTSTRAP_ADMIN_DISCORD_ID:-}
    volumes:
      - lug-data:/app/data
    restart: unless-stopped

volumes:
  lug-data:
