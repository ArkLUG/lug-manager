<div class="p-6">
  <div class="flex items-center justify-between mb-5">
    <h3 class="text-lg font-semibold text-gray-800">{{title}}</h3>
    <button onclick="closeModal()"
            class="text-gray-400 hover:text-gray-600 p-1 rounded">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  {{#is_edit}}
  <form hx-put="{{action}}" hx-target="#meeting-form-errors" hx-swap="innerHTML"
        class="space-y-4">
  {{/is_edit}}
  {{^is_edit}}
  <form hx-post="{{action}}" hx-target="#meeting-form-errors" hx-swap="innerHTML"
        class="space-y-4">
  {{/is_edit}}

    <div id="meeting-form-errors"></div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
      <input type="text" name="title" value="{{title_val}}" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
             placeholder="Monthly LUG Meeting — April">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea name="description" rows="3"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
                placeholder="Agenda, announcements, build topics...">{{description}}</textarea>
    </div>

    <div>
      <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer mb-2">
        <input type="checkbox" name="is_virtual" id="mtg-virtual-cb" {{#is_virtual}}checked{{/is_virtual}}
               class="rounded border-gray-300">
        Virtual meeting
      </label>
    </div>

    <div id="mtg-location-row">
      <label class="block text-sm font-medium text-gray-700 mb-1">Location <span class="text-red-500">*</span></label>
      <input type="text" name="location" id="mtg-location-input" value="{{location}}"
             maxlength="200"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
             placeholder="Brick Street Hobby Shop, 123 Main St, Conway, AR 72032">
      <p class="text-xs text-gray-400 mt-1">Include the full address for map links to work correctly.</p>
    </div>

    <div id="mtg-voice-row" style="display:none">
      <label class="block text-sm font-medium text-gray-700 mb-1">Discord Voice Channel</label>
      <select name="discord_voice_channel_id" id="mtg-voice-select"
              hx-get="/api/discord/voice-channel-options?selected={{discord_voice_channel_id}}"
              hx-trigger="load" hx-swap="innerHTML"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
        <option value="">Loading voice channels...</option>
      </select>
      <p class="text-xs text-gray-400 mt-1">Select a voice channel for members to join during the meeting.</p>
    </div>

    <script>
    (function() {
      var cb       = document.getElementById('mtg-virtual-cb');
      var locRow   = document.getElementById('mtg-location-row');
      var locInput = document.getElementById('mtg-location-input');
      var voiceRow = document.getElementById('mtg-voice-row');
      function toggle() {
        var v = cb.checked;
        locRow.style.display   = v ? 'none' : '';
        voiceRow.style.display = v ? '' : 'none';
        if (locInput) locInput.required = !v;
      }
      toggle();
      cb.addEventListener('change', toggle);
    })();
    </script>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Start <span class="text-red-500">*</span></label>
        <input type="datetime-local" name="start_time" value="{{start_time_input}}" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">End <span class="text-red-500">*</span></label>
        <input type="datetime-local" name="end_time" value="{{end_time_input}}" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Scope</label>
      <select name="scope" id="meeting-scope-select"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
        <option value="chapter" {{#scope_chapter}}selected{{/scope_chapter}}>Chapter Meeting</option>
        <option value="lug_wide" {{#scope_lug_wide}}selected{{/scope_lug_wide}}>LUG Wide Meeting</option>
        <option value="non_lug" {{#scope_non_lug}}selected{{/scope_non_lug}}>Non-LUG Meeting</option>
      </select>
    </div>

    <div id="meeting-chapter-row">
      <label class="block text-sm font-medium text-gray-700 mb-1">Chapter <span class="text-gray-400">(optional for admins)</span></label>
      <select name="chapter_id" id="meeting-chapter-select"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
        {{{chapter_options}}}
      </select>
    </div>

    <script>
    (function() {
      var scopeSel   = document.getElementById('meeting-scope-select');
      var chapterRow = document.getElementById('meeting-chapter-row');
      function toggle() {
        chapterRow.style.display = scopeSel.value === 'chapter' ? '' : 'none';
      }
      toggle();
      scopeSel.addEventListener('change', toggle);
    })();
    </script>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
      <textarea name="notes" rows="4" id="meeting-notes-editor"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
                placeholder="Meeting notes, reports, follow-ups...">{{notes}}</textarea>
    </div>

    <div class="flex gap-6">
      <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
        <input type="checkbox" name="suppress_discord" {{#suppress_discord}}checked{{/suppress_discord}}
               class="rounded border-gray-300">
        Suppress Discord updates
      </label>
      <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
        <input type="checkbox" name="suppress_calendar" {{#suppress_calendar}}checked{{/suppress_calendar}}
               class="rounded border-gray-300">
        Suppress calendar updates
      </label>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="flex-1 py-2 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
        {{#is_edit}}Save Changes{{/is_edit}}{{^is_edit}}Create Meeting{{/is_edit}}
      </button>
      <button type="button" onclick="closeModal()"
              class="px-4 py-2 text-gray-600 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">
        Cancel
      </button>
    </div>
  </form>
</div>
<script>
(function() {
  var el = document.getElementById('meeting-notes-editor');
  if (el && typeof EasyMDE !== 'undefined') {
    new EasyMDE({
      element: el,
      spellChecker: false,
      status: false,
      toolbar: ['bold', 'italic', 'heading', '|', 'unordered-list', 'ordered-list', '|', 'link', '|', 'preview']
    });
  }
})();
</script>
