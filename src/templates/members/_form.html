<div class="p-6">
  <div class="flex items-center justify-between mb-5">
    <h3 class="text-lg font-semibold text-gray-800">{{title}}</h3>
    <button onclick="closeModal()"
            class="text-gray-400 hover:text-gray-600 p-1 rounded">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <form hx-post="{{action}}" hx-swap="none" class="space-y-4">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">First Name <span class="text-red-500">*</span></label>
        <input type="text" name="first_name" value="{{first_name}}" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="John">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name <span class="text-red-500">*</span></label>
        <input type="text" name="last_name" value="{{last_name}}" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="Smith">
      </div>

      {{#is_edit}}
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Display Name <span class="text-gray-400">(auto-generated)</span></label>
        <input type="text" value="{{display_name}}" disabled
               class="w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-500">
      </div>
      {{/is_edit}}

      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Discord User ID <span class="text-gray-400">(optional)</span></label>
        <input type="text" name="discord_user_id" value="{{discord_user_id}}"
               {{#is_edit}}readonly class="w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-500"{{/is_edit}}
               {{^is_edit}}class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"{{/is_edit}}
               placeholder="123456789012345678">
        <p class="text-xs text-gray-400 mt-1">Leave blank for members without Discord (e.g. KFOLs)</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Discord Username</label>
        <input type="text" name="discord_username" value="{{discord_username}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="username">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" value="{{email}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="member@example.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
        <select name="role" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
                {{^is_admin}}{{#is_edit}}disabled{{/is_edit}}{{/is_admin}}>
          <option value="member" {{#role_member}}selected{{/role_member}}>Member</option>
          <option value="chapter_lead" {{#role_chapter_lead}}selected{{/role_chapter_lead}}>Chapter Lead</option>
          {{#is_admin}}<option value="admin" {{#role_admin}}selected{{/role_admin}}>Admin</option>{{/is_admin}}
        </select>
        {{^is_admin}}{{#is_edit}}
        <input type="hidden" name="role" value="{{role}}">
        <p class="text-xs text-gray-400 mt-1">Only admins can change roles.</p>
        {{/is_edit}}{{/is_admin}}
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Paid Until</label>
        <input type="date" name="paid_until" value="{{paid_until}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Birthday</label>
        <input type="date" name="birthday" value="{{birthday}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">FOL Status</label>
        <select name="fol_status" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
          <option value="afol" {{#fol_afol}}selected{{/fol_afol}}>AFOL (Adult)</option>
          <option value="tfol" {{#fol_tfol}}selected{{/fol_tfol}}>TFOL (Teen)</option>
          <option value="kfol" {{#fol_kfol}}selected{{/fol_kfol}}>KFOL (Kid)</option>
        </select>
      </div>

      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Share contact info</label>
        <select name="pii_sharing" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
          <option value="none" {{#pii_none}}selected{{/pii_none}}>Don't share</option>
          <option value="verified" {{#pii_verified}}selected{{/pii_verified}}>Verified members only</option>
          <option value="all" {{#pii_all}}selected{{/pii_all}}>All members</option>
        </select>
        <p class="text-xs text-gray-400 mt-1">Controls who can see this member's email, phone, address, and Discord username.</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
        <input type="tel" name="phone" value="{{phone}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="(555) 123-4567">
      </div>

      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
        <input type="text" name="address_line1" value="{{address_line1}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 mb-2"
               placeholder="Street address">
        <input type="text" name="address_line2" value="{{address_line2}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="Apt, suite, unit (optional)">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
        <input type="text" name="city" value="{{city}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
        <input type="text" name="state" value="{{state}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="AR">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">ZIP</label>
        <input type="text" name="zip" value="{{zip}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
               placeholder="72201">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Chapter <span class="text-gray-400">(optional)</span></label>
      <select name="chapter_id" id="member-chapter-select"
              hx-get="/api/chapter-options?selected={{chapter_id_str}}" hx-trigger="load" hx-swap="innerHTML"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
        <option value="">Loading chapters…</option>
      </select>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="flex-1 py-2 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
        {{#is_edit}}Save Changes{{/is_edit}}{{^is_edit}}Add Member{{/is_edit}}
      </button>
      <button type="button" onclick="closeModal()"
              class="px-4 py-2 text-gray-600 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Cancel
      </button>
    </div>
  </form>
</div>
