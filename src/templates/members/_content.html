<div class="space-y-4" data-page-title="Members">
  <!-- Header + Add button -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-xl font-semibold text-gray-800">Members</h2>
      <p class="text-sm text-gray-500 mt-0.5">All registered LUG members</p>
    </div>
    <div class="flex items-center gap-2">
      <button hx-get="/members/me" hx-target="#modal" hx-swap="innerHTML"
              class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Edit My Profile
      </button>
      {{#can_see_dues}}
      <button hx-get="/members/new" hx-target="#modal" hx-swap="innerHTML"
              class="inline-flex items-center gap-2 px-4 py-2 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Member
      </button>
      {{/can_see_dues}}
    </div>
  </div>

  <!-- Members table (DataTables manages content via AJAX) -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto p-1">
      <table id="members-table" class="w-full text-sm" style="width:100%">
        <thead>
          <tr>
            <th>Name</th>
            {{#can_see_pii}}<th>Discord</th>{{/can_see_pii}}
            {{#can_see_pii}}<th>Email</th>{{/can_see_pii}}
            {{#can_see_dues}}<th>Dues</th>{{/can_see_dues}}
            <th>Role</th>
            <th>FOL</th>
            <th>Chapter</th>
            {{#can_see_dues}}<th>Actions</th>{{/can_see_dues}}
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Dues management modal -->
<div id="dues-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6">
    <h3 class="font-semibold text-gray-800 mb-1">Manage Dues</h3>
    <p class="text-sm text-gray-500 mb-4" id="dues-member-name"></p>
    <form id="dues-form" hx-post="" hx-swap="none">
      <label class="block text-sm font-medium text-gray-700 mb-1">Paid Until</label>
      <input type="date" name="paid_until" id="dues-date"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-400">
      <div class="flex gap-3">
        <button type="submit" class="flex-1 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">Mark Paid</button>
        <button type="button" onclick="markUnpaid()" class="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200">Mark Unpaid</button>
        <button type="button" onclick="closeDuesModal()" class="px-4 py-2 text-gray-500 rounded-lg text-sm hover:bg-gray-100">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
(function() {
  // ── helpers ──────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── dues modal ───────────────────────────────────────────────────────────
  window.closeDuesModal = function() {
    document.getElementById('dues-modal').classList.add('hidden');
  };
  window.setMemberDues = function(memberId, memberName) {
    document.getElementById('dues-member-name').textContent = memberName;
    var form = document.getElementById('dues-form');
    form.setAttribute('hx-post', '/members/' + memberId + '/paid');
    htmx.process(form);
    var nextYear = new Date().getFullYear() + 1;
    document.getElementById('dues-date').value = nextYear + '-03-31';
    document.getElementById('dues-modal').classList.remove('hidden');
  };
  window.markUnpaid = function() {
    document.getElementById('dues-date').value = '';
    document.getElementById('dues-form').requestSubmit();
  };

  // Reload table after dues update
  document.getElementById('dues-form').addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.successful) {
      closeDuesModal();
      if (window.membersTable) window.membersTable.ajax.reload(null, false);
    }
  });

  // Reload table after member create/edit
  document.body.addEventListener('membersUpdated', function() {
    if (window.membersTable) window.membersTable.ajax.reload(null, false);
  });

  // ── DataTables columns ───────────────────────────────────────────────────
  var canSeePii  = {{#can_see_pii}}true{{/can_see_pii}}{{^can_see_pii}}false{{/can_see_pii}};
  var canSeeDues = {{#can_see_dues}}true{{/can_see_dues}}{{^can_see_dues}}false{{/can_see_dues}};
  var isAdmin    = {{#is_admin}}true{{/is_admin}}{{^is_admin}}false{{/is_admin}};

  var columns = [
    {
      data: 'display_name',
      render: function(data, type, row) {
        if (type !== 'display') return data;
        var full = escHtml((row.first_name || '') + ' ' + (row.last_name || '')).trim();
        var html = '<div class="font-medium text-gray-800">' + escHtml(data) + '</div>';
        if (full && full !== escHtml(data)) {
          html += '<div class="text-xs text-gray-400">' + full + '</div>';
        }
        return html;
      }
    }
  ];

  if (canSeePii) {
    columns.push({
      data: 'discord_username',
      render: function(data, type) {
        if (type !== 'display') return data || '';
        return data ? '<span class="text-gray-500">@' + escHtml(data) + '</span>' : '<span class="text-gray-300 text-xs">&mdash;</span>';
      }
    });
    columns.push({
      data: 'email',
      render: function(data, type) {
        if (type !== 'display') return data || '';
        return data ? '<span class="text-gray-500">' + escHtml(data) + '</span>' : '<span class="text-gray-300 text-xs">&mdash;</span>';
      }
    });
  }

  if (canSeeDues) {
    columns.push({
      data: 'is_paid',
      searchable: false,
      render: function(data, type, row) {
        if (type !== 'display') return row.is_paid ? 1 : 0;
        var badge = row.is_paid
          ? '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-700">Paid</span>'
          : '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-700">Unpaid</span>';
        if (row.paid_until) {
          badge += '<div class="text-xs text-gray-400 mt-0.5">until ' + escHtml(row.paid_until) + '</div>';
        }
        return badge;
      }
    });
  }

  columns.push(
    {
      data: 'role',
      render: function(data, type) {
        if (type !== 'display') return data;
        var cls = data === 'admin'        ? 'bg-yellow-100 text-yellow-800'
                : data === 'chapter_lead' ? 'bg-blue-100 text-blue-600'
                :                          'bg-gray-100 text-gray-600';
        return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ' + cls + '">' + escHtml(data) + '</span>';
      }
    },
    {
      data: 'fol_status',
      render: function(data, type) {
        if (type !== 'display') return data || 'afol';
        var label = (data || 'afol').toUpperCase();
        var cls = data === 'kfol' ? 'bg-pink-100 text-pink-700'
                : data === 'tfol' ? 'bg-cyan-100 text-cyan-700'
                :                   'bg-gray-100 text-gray-600';
        return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ' + cls + '">' + label + '</span>';
      }
    },
    {
      data: 'chapter_name',
      render: function(data, type) {
        if (type !== 'display') return data || '';
        return data ? '<span class="text-gray-600 text-xs">' + escHtml(data) + '</span>' : '<span class="text-gray-300 text-xs">—</span>';
      }
    }
  );

  {{#can_see_dues}}
  columns.push({
    data: null,
    orderable: false,
    searchable: false,
    render: function(data, type, row) {
      if (type !== 'display') return '';
      var html = '<div class="flex items-center justify-end gap-2">'
        + '<button hx-get="/members/' + row.id + '" hx-target="#modal" hx-swap="innerHTML"'
        + ' class="text-xs px-2 py-1 text-gray-600 border border-gray-300 rounded hover:bg-gray-50">Edit</button>'
        + '<button onclick="setMemberDues(' + row.id + ',\'' + escHtml(row.display_name).replace(/'/g,'&#39;') + '\')"'
        + ' class="text-xs px-2 py-1 text-gray-600 border border-gray-300 rounded hover:bg-gray-50">Dues</button>';
      {{#is_admin}}
      html += '<button hx-delete="/members/' + row.id + '" hx-confirm="Delete ' + escHtml(row.display_name) + '? This cannot be undone." hx-swap="none"'
        + ' class="text-xs px-2 py-1 text-red-500 border border-red-300 rounded hover:bg-red-50">Delete</button>';
      {{/is_admin}}
      html += '</div>';
      return html;
    }
  });
  {{/can_see_dues}}

  // ── init ─────────────────────────────────────────────────────────────────
  if (typeof DataTable === 'undefined') {
    console.error('DataTables not loaded — check CDN URL in layout.html');
    return;
  }
  if (window.membersTable) {
    window.membersTable.destroy();
    window.membersTable = null;
  }
  window.membersTable = new DataTable('#members-table', {
    serverSide: true,
    ajax: {
      url: '/api/members/datatable',
      type: 'POST',
      // Flatten DataTables' bracket-notation params into plain keys so
      // Crow's form-body parser doesn't have to handle URL-encoded brackets.
      data: function(d) {
        var orderIdx = d.order && d.order[0] ? d.order[0].column : 0;
        var orderName = columns[orderIdx] && columns[orderIdx].data ? columns[orderIdx].data : 'display_name';
        return {
          draw:      d.draw,
          start:     d.start,
          length:    d.length,
          search:    d.search ? d.search.value : '',
          order_col_name: orderName,
          order_dir: d.order && d.order[0] ? d.order[0].dir    : 'asc'
        };
      }
    },
    columns: columns,
    pageLength: 25,
    lengthMenu: [10, 25, 50, 100],
    order: [[0, 'asc']],
    language: {
      emptyTable: 'No members yet.',
      zeroRecords: 'No matching members found.'
    },
    drawCallback: function() {
      // Re-process HTMX on new rows so Edit buttons work
      htmx.process(document.getElementById('members-table'));
    }
  });
})();
</script>
