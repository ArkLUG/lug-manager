<div class="space-y-6">

  <div class="flex items-center gap-3">
    <a hx-get="/chapters/{{chapter_id}}" hx-target="#main-content" hx-push-url="true" hx-swap="innerHTML"
       class="text-sm text-gray-500 hover:text-gray-700 transition-colors cursor-pointer">← {{chapter_name}}</a>
    <span class="text-gray-300">/</span>
    <span class="text-sm font-medium text-gray-700">Members</span>
  </div>

  <!-- Add member form -->
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <h3 class="text-base font-semibold text-gray-900 mb-4">Add Member to Chapter</h3>
    <form hx-post="/chapters/{{chapter_id}}/members"
          hx-target="body"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful){ htmx.ajax('GET','/chapters/{{chapter_id}}/members',{target:'#main-content',swap:'innerHTML'}); }"
          class="flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-48">
        <label class="block text-sm font-medium text-gray-700 mb-1">Member</label>
        <select name="member_id" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
          {{{member_options}}}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Chapter Role</label>
        <select name="chapter_role" required
                class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
          <option value="member">Member</option>
          <option value="event_manager">Event Manager</option>
          {{#is_admin}}<option value="lead">Chapter Lead</option>{{/is_admin}}
        </select>
      </div>
      <button type="submit"
              class="px-4 py-2 bg-yellow-400 text-gray-900 rounded-lg text-sm font-semibold hover:bg-yellow-300 transition-colors">
        Add
      </button>
    </form>
  </div>

  <!-- Current members -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100">
      <h3 class="text-base font-semibold text-gray-900">Current Members</h3>
    </div>

    {{^members}}
    <div class="px-6 py-8 text-center text-sm text-gray-500">No members in this chapter yet.</div>
    {{/members}}

    {{#members}}
    <div class="px-6 py-3 flex items-center gap-4 border-b border-gray-50 last:border-0">
      <div class="flex-1 min-w-0">
        <div class="font-medium text-gray-900 text-sm">{{display_name}}</div>
        <div class="text-xs text-gray-400">@{{discord_username}}</div>
      </div>

      <!-- Role badge + selector -->
      <form hx-post="/chapters/{{chapter_id}}/members"
            hx-target="body"
            hx-swap="none"
            hx-on::after-request="if(event.detail.successful){ htmx.ajax('GET','/chapters/{{chapter_id}}/members',{target:'#main-content',swap:'innerHTML'}); }"
            class="flex items-center gap-2">
        <input type="hidden" name="member_id" value="{{member_id}}">
        <select name="chapter_role"
                onchange="this.form.requestSubmit()"
                class="px-2 py-1 border rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-yellow-400
                       {{#is_lead}}border-purple-300 bg-purple-50 text-purple-700{{/is_lead}}
                       {{#is_event_manager}}border-blue-300 bg-blue-50 text-blue-700{{/is_event_manager}}
                       {{#is_member}}border-gray-300 bg-gray-50 text-gray-700{{/is_member}}">
          <option value="member"         {{#is_member}}selected{{/is_member}}>Member</option>
          <option value="event_manager"  {{#is_event_manager}}selected{{/is_event_manager}}>Event Manager</option>
          {{#is_admin}}<option value="lead" {{#is_lead}}selected{{/is_lead}}>Chapter Lead</option>{{/is_admin}}
        </select>
      </form>

      <button hx-delete="/chapters/{{chapter_id}}/members/{{member_id}}"
              hx-target="body"
              hx-swap="none"
              hx-confirm="Remove {{display_name}} from this chapter?"
              hx-on::after-request="if(event.detail.successful){ htmx.ajax('GET','/chapters/{{chapter_id}}/members',{target:'#main-content',swap:'innerHTML'}); }"
              class="text-red-400 hover:text-red-600 transition-colors p-1 rounded">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    {{/members}}
  </div>

</div>
