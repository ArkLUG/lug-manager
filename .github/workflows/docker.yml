name: CI — Build, Test, Scan & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arklug/lug-manager

jobs:
  # ── SAST: CodeQL static analysis ──────────────────────────────────────────
  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          build-mode: manual

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make pkg-config \
            libcurl4-openssl-dev libsqlite3-dev libssl-dev \
            git ca-certificates

      - name: Build for CodeQL
        run: |
          cmake -B build -S . -DBUILD_TESTS=OFF
          cmake --build build -j$(nproc)

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

  # ── Lint: Dockerfile + secrets + cppcheck ─────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --suppress=missingInclude --suppress=unmatchedSuppression \
            --error-exitcode=0 \
            --inline-suppr \
            --quiet \
            -I src/ \
            src/ 2>&1 | tee cppcheck-results.txt
          # Show results but don't fail the build
          cat cppcheck-results.txt

  # ── Build, test & push Docker image ───────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Test coverage report ──────────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make pkg-config \
            libcurl4-openssl-dev libsqlite3-dev libssl-dev \
            git ca-certificates lcov

      - name: Build with coverage
        run: |
          cmake -B build -S . -DBUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="--coverage" \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_SHARED_LINKER_FLAGS="--coverage"
          cmake --build build -j"$(nproc)"

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -j"$(nproc)"

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch,gcov,source,unused \
            --rc lcov_branch_coverage=1
          lcov --remove coverage.info \
            '*/build/_deps/*' '*/tests/*' '/usr/*' '*/gtest/*' '*/googletest/*' \
            --output-file coverage-filtered.info \
            --ignore-errors mismatch,gcov,source,unused
          lcov --list coverage-filtered.info || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-filtered.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── SCA: scan Docker image for known CVEs ──────────────────────────────────
  image-scan:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── DAST: scan running container for vulnerabilities ──────────────────────
  dast:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and start application container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}"
          docker pull "$IMAGE"
          docker run -d --name lug-dast \
            -p 8080:8080 \
            -e DISCORD_BOT_TOKEN=dast-placeholder \
            -e DISCORD_CLIENT_ID=dast-placeholder \
            -e DISCORD_CLIENT_SECRET=dast-placeholder \
            -e DISCORD_REDIRECT_URI=http://localhost:8080/auth/callback \
            "$IMAGE"
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/login > /dev/null && break
            sleep 1
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          cmd_options: '-a -j'

      - name: Stop container
        if: always()
        run: docker stop lug-dast || true && docker rm lug-dast || true
